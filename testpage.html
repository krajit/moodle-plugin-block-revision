<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Learning Tracker Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Initial button colors (grey) */
    .btn-toggle-group .btn {
      background-color: #e0e0e0;
      color: #000;
      border-color: #ccc;
    }

    /* Selected states */
    .btn-check:checked + .btn-fresh {
      background-color: #dc3545; /* red */
      color: #fff;
    }

    .btn-check:checked + .btn-learning {
      background-color: #ffc107; /* yellow */
      color: #000;
    }

    .btn-check:checked + .btn-learned {
      background-color: #28a745; /* green */
      color: #fff;
    }
  </style>
</head>
<body class="p-4">

  <div class="container">
    <h2 class="mb-4">Learning Tracker</h2>
    <form>
      <!-- Learning Level: Button Toggle Group -->
      <div class="mb-3">
        <label class="form-label d-block">Learning Level</label>
        <div class="btn-group btn-toggle-group" role="group" aria-label="Learning level">
          <input type="radio" class="btn-check" name="learningLevel" id="fresh" value="Fresh" required>
          <label class="btn btn-outline-secondary btn-fresh" for="fresh">Fresh</label>

          <input type="radio" class="btn-check" name="learningLevel" id="learning" value="Learning">
          <label class="btn btn-outline-secondary btn-learning" for="learning">Learning</label>

          <input type="radio" class="btn-check" name="learningLevel" id="learned" value="Learned">
          <label class="btn btn-outline-secondary btn-learned" for="learned">Learned</label>
        </div>
      </div>

      <!-- Number of Revisions -->
      <div class="mb-3">
        <label for="revisionCount" class="form-label">Number of Times Revised</label>
        <input type="number" class="form-control" id="revisionCount" name="revisionCount" min="0" required>
      </div>

      <!-- Suggested Next Review Date -->
      <div class="mb-3">
        <label for="nextReview" class="form-label">Suggested Next Review Date</label>
        <input type="date" class="form-control" id="nextReview" name="nextReview" required>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>

</body>
</html>
